front:
  text: 太一救苦天尊說拔度血湖寳懴被六爾時救苦天尊坐九色蓮臺威光遍滿十方諸大天尊救苦真人一切仙衆說諸血湖産亡血殂罪業因縁時有妙行真人出班長跪告天尊曰臣今下觀慾界酆都羅山諸獄異名九幽之獄次有二十四獄三十六獄一百八獄阿鼻地獄岱岳鋒刃十八地獄大小鐵圍無間地獄五湖四海九江泉曲地獄孟津黄波流砂地獄應化牢檻八萬四千幽獄凡遇赦恩皆準仁慈普霑大澤殊不知有血湖一獄在大鐵圍山之南别有大獄其獄名曰無間之獄獄之有獄號曰硤石之獄獄之東北地號血湖長一萬二千里周回八萬四千里下有一門名曰伏波乃血湖大神主之其獄有五一曰血之獄二曰血冷之獄三曰血汙之獄四曰血資之獄五曰血湖之獄獨此一獄又列爲五有硤石無間之號大小鐵圍之山皆分拘帶血之䰟腥穢無邊之衆以至食胎黄球之鬼興訟三官青姑黒齒之神拘䰟九地天狼天狗競施呑啗之威六甲六丁莫賜護持之力動經億劫無有出期乃是世間産死之䰟血傷之䰟墜墮斯獄縁此等罪報蓋生前多有狼毒損物傷人不孝不忠不仁不義躭淫五濁靈識沈迷淪滯三塗形神散亂汝等罪䰟以夙生𡨚對受報兹身厄難血屍命絶産死或懷六甲命屬三元墮子落胎因而悶絶或母存子喪或母喪子存或母子俱喪男女未分而俱死或胚胎方成而遽死或染患而將臨産月或懷娠而失墜髙低或藥餌誤毒而中傷或癰疽痢疾而身殞或崩漏至死或淋瀝而亡或懷胞胎而竟不分娩或生男女而月内傾亡或因血病至死或被刀刃所傷未盡天年乃爲夭喪或身殁干戈之下䰟飛矢石之場或抱惡病而告終或犯王法而受戮形軀混濁神氣昏濛一切血死之衆遍體腥膻形骸臭穢千生萬劫無有出期況幽隂至苦業報最深硤石之獄不可聞見鐵圍萬帀劒刃千重巨頂顛危中開一穴山漫黒霧隂霾自然惡毒之汁交流沈浸罪人煎煑身心骨肉潰爛苦楚難禁動經億劫不覩光明天恩符命未甞能到隂官拷掠晝夜無停啖髓食心翻屍擲體諸獄之苦最重血湖一入此扄何時解脫爾時救苦天尊爲諸衆生宣說太上真符流光寳符丹臺玉冊飛玄靈章頒行諸獄幽扄徑到硤石血湖普放光明照燭幽闇鐵城摧毁血湖枯乾灰河化碧玉之池硤石變清涼之座凡民積衅報對莫逃以宿世之𡨚仇作今生之子母豈謂熊羆入夢之始常懷鴟梟食母之思甫臨十月之期竟作九泉之鬼呱呱孩提之在悠悠䰟𩲸何歸或巳分娩而兩殂或未離析而全喪形骸穢濁神性昏㝠血湖之中産死女䰟惟願巳生未生悉遂生成之快樂前化後化俱蒙化育之深仁更有血氣之屬必各有之民物之胞悉本同體傷胎破卵茹苦銜𡨚前世惡因今生業報不待日月滿足巳覺娠孕動揺蓄鬼氣於無形毒流臟腑遭黄球之暗食痛徹肝腸或飲藥以自戕或抱疾而隨喪沈埋待替痛苦誰憐惟願血氣和平早脫幽隂之界䰟神澄正上升福慶之堂及有爭地爭城自昔有殺人之禍圖王圖覇不幸逢戰陣之時方當披甲以從戎所願執俘而獻凱勢孤援寡氣盡力疲身膏血刃之場骨埋青荒之野望郷閭而甚逺求祭享以何從雪積冰堅漠漠湖沙之上天隂雨濕啾啾哭夜之聲雖報國以輸忠實無罪而就死或難逃於劫數亦不免於傷殘似此沉淪實堪怜憫血湖獄中戰亡陣死男䰟等衆惟願慶雲開生門不墜昏迷之境神功攝遊氣託生忠義之家再有竒疾縈纏豈災迍之適至宿縁幸報宜善惡以無差不因訾毀三寳而來則是毒害衆生所至抱風癩則皮膚潰爛苦癰疽則血脉淋漓吁吁枕上之聲淹淹泉下之鬼見之可惡死亦誰憐或因吐痢淋漓而殂各有臭汙腥穢之氣不因救拔曷遂超昇血湖獄中一切癰疽瀉痢死亡風癩瘡痰等衆惟願痼疾復形早使六根清淨慧光燭下同瞻三寳提攜又有王法昭明儼條章之具在人心邪僻䧟刑辟而不知豈不畏三尺之嚴終不忍一朝之忿狠闘殺傷之衆强梁劫掠之徒䰟飛伏鎖之時身首異處命斷登場之後血肉淋漓身雖棄於屍林䰟實拘於泉曲業縁未盡忿氣猶存血湖獄中一切冒犯王法死亡等衆惟願聽生神章使形神而復體持元始籙俾惡業以頓除是以太乙救苦天尊放九色祥光遍照諸獄赦宥罪䰟普使一切産厄血湖罪䰟脫離苦趣得覩陽光是故燒香歸身歸命五體投地志心朝禮三清聖衆
